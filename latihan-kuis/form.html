<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Akademi Arantohr</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&family=MedievalSharp&display=swap">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="assets/cardWizard.webp" type="image/x-icon">
    <style>
        body {
            background-image: url("assets/fantasyAcademy.webp");
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>

<body>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="bag-form">
            <form action="biography.php" method="post">
                <h2>PENDAFTARAN AKADEMI ARANTOHR</h2>
                <div class="col">
                    <label for="nama">Nama</label>
                    <input type="text" name="nama" id="nama" required pattern=".*\S.*">
                </div>
                <div class="col">
                    <label for="jk">Jenis Kelamin</label><br>
                    <input type="radio" name="jenis_kelamin" value="Laki-laki" id="jk" required> Laki-laki
                    <input type="radio" name="jenis_kelamin" value="Perempuan" id="jk" style="margin-left: 35px;">
                    Perempuan
                </div>
                <div class="col">
                    <label for="ras">Ras</label>
                    <select name="ras" id="ras" required>
                        <option value="" disabled selected>-- Pilih Ras --</option>
                        <option value="Human">Human</option>
                        <option value="Elf">Elf</option>
                        <option value="Dwarf">Dwarf</option>
                    </select>
                </div>
                <div class="col">
                    <label for="kelas">Kelas</label>
                    <select name="kelas" id="kelas" required>
                        <option value="" disabled selected>-- Pilih Kelas --</option>
                        <option value="Knight">Knight</option>
                        <option value="Wizard">Wizard</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-8">
                        <label for="rekomendasi">Rekomendasi</label><br>
                        <input type="checkbox" name="rekomendasi[]" value="Professor Hubert"> Professor Hubert<br>
                        <input type="checkbox" name="rekomendasi[]" value="Sir Roland"> Sir Roland<br>
                        <input type="checkbox" name="rekomendasi[]" value="Duke Eugene"> Duke Eugene<br>
                    </div>
                    <div class="col-4 bag-btnSeal" style="text-align: -webkit-right">
                        <button type="submit"><img src="assets/seal.webp" width="110"></button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
