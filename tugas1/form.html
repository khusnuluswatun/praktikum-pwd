<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <title>Pesanan</title>
    <style>
        #bag--form {
            height: 100%;
            /* background: linear-gradient(rgb(203, 229, 252), #dbdddf); */
            background-image: linear-gradient(rgb(255, 255, 255, 0.85), rgba(255, 255, 255, 0.95)), url("../assets/bg2.jpg");
        }

        .bag-landg {
            width: 65%;
            background-color: white;
        }
    </style>
</head>

<body>
    <div id="bag--form" class="d-flex justify-content-center p-5">
        <div class="rounded-4 shadow bag-landg d-flex justify-content-center p-5">
            <div class="col-md-12">
                <h3 class="mb-3 text-center">Pembelian Item</h3>
                <form action="landing.html" method="get">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="nama" class="form-label">Nama</label>
                            <input type="text" class="form-control" id="nama" placeholder="Masukkan nama di sini.."
                                required>
                        </div>
                        <div class="col-12">
                            <label for="alamat" class="form-label">Alamat</label>
                            <input type="text" class="form-control" id="alamat" placeholder="Masukkan alamat di sini.."
                                required>
                        </div>
                        <div class="col-md-5">
                            <label for="kabupaten" class="form-label">Kabupaten</label>
                            <select class="form-select" id="kabupaten" required>
                                <option value="">Choose...</option>
                                <option value="Sleman">Sleman </option>
                                <option value="Bantul">Bantul </option>
                                <option value="Kulon Progo">Kulon Progo </option>
                                <option value="Gunung Kidul">Gunung Kidul </option>
                                <option value="Kota Yogyakarta">Kota Yogyakarta</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="kecamatan" class="form-label">Kecamatan</label>
                            <select class="form-select" id="kecamatan" required>
                                <option value="">Choose...</option>
                                <option value="Ngemplak">Ngemplak</option>
                                <option value="Kalasan">Kalasan</option>
                                <option value="Ngaglik">Ngaglik</option>
                                <option value="Depok">Depok</option>
                                <option value="Sleman">Sleman</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="kode_pos" class="form-label">Kode pos</label> <input type="text" maxlength="5"
                                minlength="5" class="form-control" id="kode_pos" required>
                        </div>
                        <div class="col-12">
                            <label for="no_telp" class="form-label">No. Telepon</label> <input type="text"
                                class="form-control" id="no_telp" placeholder="0812 2847 8987" required>
                        </div>
                    </div>

                    <hr class="my-4">
                    <!-- <h5 class="mb-3">Barang yang dibeli</h5> -->
                    <div class="col-md-12 mb-3">
                        <label for="slc-produk" class="form-label">Produk</label>
                        <select class="form-select" id="slc-produk" required>
                            <option value="">Pilih Produk</option>
                            <optgroup label="Obat">
                                <option value="paracetamol">Paracetamol 500mg - Rp5.000</option>
                                <option value="amoxicillin">Amoxicillin 500mg - Rp12.000</option>
                                <option value="salicylamide">Salicylamide 65mg - Rp6.000</option>
                            </optgroup>
                            <optgroup label="Suplemen">
                                <option value="blackmores">Blackmores Vitamin C - Rp120.000</option>
                                <option value="imboost">Imboost Force - Rp85.000</option>
                                <option value="enervon">Enervon-C - Rp35.000</option>
                            </optgroup>
                            <optgroup label="Alat Kesehatan">
                                <option value="tensimeter">Omron Tensimeter - Rp350.000</option>
                                <option value="termometer">Termometer Digital - Rp45.000</option>
                                <option value="oximeter">Nebulizer Omron - Rp420.000</option>
                            </optgroup>
                            <optgroup label="Vitamin">
                                <option value="vitd">Vitacimin - Rp18.000</option>
                                <option value="vitc">Vitamin C IPI - Rp20.000</option>
                                <option value="vitb">Vitamin B Complex - Rp30.000</option>
                            </optgroup>
                            <optgroup label="Kecantikan">
                                <option value="wardah">Wardah Facial Wash - Rp28.000</option>
                                <option value="garnier">Garnier Micellar Water - Rp35.000</option>
                                <option value="ponds">Scarlett Brightening Serum - Rp75.000</option>
                            </optgroup>
                            <optgroup label="Produk Bayi">
                                <option value="telon">Minyak Telon Cap Lang - Rp18.000</option>
                                <option value="zwitsal">Zwitsal Baby Lotion - Rp25.000</option>
                                <option value="pampers">Pampers Baby Dry - Rp75.000</option>
                            </optgroup>
                            <optgroup label="Feminine Care">
                                <option value="softex">Softex Daun Sirih - Rp12.000</option>
                                <option value="laurier">Laurier Active Day - Rp15.000</option>
                            </optgroup>
                            <optgroup label="Makanan & Minuman">
                                <option value="yakult">Yakult - Rp11.000</option>
                                <option value="pediasure">Sari Roti Coklat - Rp7.000</option>
                            </optgroup>



                        </select>
                    </div>

                    <div class="col-md-12">
                        <label for="jumlah" class="form-label">Jumlah</label>
                        <input type="number" name="jumlah" id="jumlah" class="form-control" min="1" required
                            placeholder="Masukkan jumlah di sini..">
                    </div>

                    <hr class="my-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="instanp">
                        <label class="form-check-label" for="instanp"> Gunakan pengiriman instan (biaya
                            tambahan)</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="privasip">
                        <label class="form-check-label" for="privasip">Kirim dalam kemasan rahasia (privasi)</label>
                    </div>
                    <hr class="my-3">
                    <h5 class="mb-3">Pembayaran</h5>
                    <div class="my-3">
                        <div class="form-check">
                            <input id="bca" name="pembayaran" type="radio" class="form-check-input" checked required>
                            <label class="form-check-label" for="bca">BCA</label>
                        </div>
                        <div class="form-check">
                            <input id="bri" name="pembayaran" type="radio" class="form-check-input" required>
                            <label class="form-check-label" for="bri">BRI</label>
                        </div>
                        <div class="form-check">
                            <input id="shopeepay" name="pembayaran" type="radio" class="form-check-input" required>
                            <label class="form-check-label" for="shopeepay">ShopeePay</label>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-primary me-3 px-3" type="submit">Checkout</button>
                        <button class="btn btn-warning px-4" type="reset">Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
